<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SRMS — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      position: relative;
      overflow: hidden;
    }

    /* Animated background blobs (very subtle in light theme) */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 70%);
      top: -200px; left: -200px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,0.04) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-30px) scale(1.05); }
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      position: relative;
      z-index: 1;
      animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(24px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.25);
    }

    .login-logo {
      height: 60px;
      width: auto;
      border-radius: 6px;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .logo-wrap h1 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, #1e3a8a, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .logo-wrap p {
      font-size: 13px;
      color: #64748b;
    }

    /* Error banner */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-left: 3px solid #ef4444;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #991b1b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-size: 15px;
      color: #0f172a;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .field input::placeholder { color: #94a3b8; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.25);
    }

    .btn-login:active { transform: translateY(0); }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #64748b;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
        margin: 16px;
      }
      .logo-wrap {
        margin-bottom: 24px;
      }
      .logo-wrap h1 {
        font-size: 20px;
      }
      .field {
        margin-bottom: 16px;
      }
      .btn-login {
        padding: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo-wrap">
      <img src="/static/logo.jpg" alt="EETIRP Logo" class="login-logo" />
      <div style="font-size: 14px; font-weight: 700; color: #1e3a8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;">EETIRP PVT LTD</div>
      <h1>Admin Portal</h1>
      <p>Authorized access only — SRMS</p>
    </div>

    {% if error %}
    <div class="error-banner">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" id="username"
                 placeholder="Enter admin username"
                 autocomplete="off" required autofocus/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔑</span>
          <input type="password" name="password" id="password"
                 placeholder="••••••••" required/>
        </div>
      </div>

      <button type="submit" class="btn-login">Sign In to Dashboard →</button>
    </form>

    <div class="footer-note">EETIRP PVT LTD &copy; 2026| All Right Reserved · Contact: <a href="mailto:eetirpltd@gmail.com" style="color: #2563eb; text-decoration: none; font-weight: 600;">eetirpltd@gmail.com</a></div>
  </div>

</body>
</html>
